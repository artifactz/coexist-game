# This workflow will build the "HTML5" preset and deploy the output folder to GitHub Pages.

name: Deploy Godot to GitHub Pages

on:
  push:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: docker://barichello/godot-ci:4.6.1
    steps:
    - uses: actions/checkout@v4

    - name: Setup
      run: |
        mkdir -v -p ~/.local/share/godot/export_templates/
        mkdir -v -p ~/.config/
        mv /root/.config/godot ~/.config/godot
        mv /root/.local/share/godot/export_templates/4.6.1.stable ~/.local/share/godot/export_templates/4.6.1.stable
        mkdir -v -p export/web

    - name: Restore Assets Cache
      id: cache-assets-restore
      uses: actions/cache/restore@v5
      with:
        path: .godot/imported
        key: godot-assets

    - name: Import Assets
      run: godot --headless --verbose --editor --quit

    - name: Web Build
      run: godot --headless --verbose --export-release "HTML5" ./export/web/index.html

    - name: Save Assets Cache
      uses: actions/cache/save@v5
      with:
        path: .godot/imported
        key: ${{ steps.cache-assets-restore.outputs.cache-primary-key }}

    - uses: actions/upload-artifact@v4
      with:
        name: export-web
        path: ./export/web

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: export-web
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
